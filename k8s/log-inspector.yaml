apiVersion: v1
kind: Namespace
metadata:
  name: log-inspector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-inspector-api
  namespace: log-inspector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-inspector-api
  template:
    metadata:
      labels:
        app: log-inspector-api
    spec:
      containers:
        - name: api
          image: docker.io/library/ai-log-inspector:0.3.5
          imagePullPolicy: IfNotPresent
          args: ["server"]
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 8080
          env:
            - name: DATA_DIR
              value: /data
            - name: MAX_QUERY_HOURS
              value: "6"
            - name: MAX_LIMIT
              value: "1000"
            - name: MODEL_SERVICE_URL
              value: http://log-inspector-model:8090
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /var/lib/log-inspector-api
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: log-inspector-api
  namespace: log-inspector
spec:
  selector:
    app: log-inspector-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-inspector-model
  namespace: log-inspector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-inspector-model
  template:
    metadata:
      labels:
        app: log-inspector-model
    spec:
      containers:
        - name: model
          image: docker.io/library/ai-log-inspector:0.3.5
          imagePullPolicy: IfNotPresent
          args: ["model-server"]
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 8090
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: log-inspector-model
  namespace: log-inspector
spec:
  selector:
    app: log-inspector-model
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-inspector-agent
  namespace: log-inspector
spec:
  selector:
    matchLabels:
      app: log-inspector-agent
  template:
    metadata:
      labels:
        app: log-inspector-agent
    spec:
      serviceAccountName: default
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: docker.io/library/ai-log-inspector:0.3.5
          imagePullPolicy: IfNotPresent
          args: ["agent"]
          securityContext:
            runAsUser: 0
          env:
            - name: API_URL
              value: http://log-inspector-api:8080
            - name: LOG_DIR
              value: /host/var/log/paas
            - name: STATE_PATH
              value: /state/offsets.json
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: service-logs
              mountPath: /host/var/log/paas
              readOnly: true
            - name: state
              mountPath: /state
      volumes:
        - name: service-logs
          hostPath:
            path: /var/log/paas
            type: DirectoryOrCreate
        - name: state
          hostPath:
            path: /var/lib/log-inspector-agent
            type: DirectoryOrCreate
